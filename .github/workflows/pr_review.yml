name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: cd mlite && uv pip install -e ".[dev]" --system

      - name: Run tests
        run: cd mlite && pytest -q

  review:
    name: Claude Review
    needs: test
    runs-on: ubuntu-latest
    # Skip draft PRs — only review when the author marks ready
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3

      - name: Install review dependencies
        run: uv pip install anthropic --system

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/review_pr.py ${{ github.event.pull_request.number }}
