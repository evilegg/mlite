name: PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    name: Test + Claude Review
    runs-on: ubuntu-latest
    # Only fire when the repo owner comments `/review` on a pull request
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review') &&
      github.event.comment.user.login == github.repository_owner

    steps:
      - name: Acknowledge with eyes reaction
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out PR branch
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install -e "mlite/[dev]" anthropic --system

      - name: Run tests
        run: cd mlite && pytest -q

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/review_pr.py ${{ github.event.issue.number }}
